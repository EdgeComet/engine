hosts:
  - id: 888
    domain: "host888.test"
    render_key: "test-key-888"
    enabled: true
    dimensions:
      desktop:
        id: 1
        width: 1920
        height: 1080
        match_ua:
          - "*"
    render:
      timeout: 10s
      cache:
        ttl: 5m
        expired:
          strategy: "serve_stale"
          stale_ttl: 5m

  - id: 999
    domain: "host999.test"
    render_key: "test-key-999"
    enabled: true
    dimensions:
      desktop:
        id: 1
        width: 1920
        height: 1080
        match_ua:
          - "*"
    render:
      timeout: 10s
      cache:
        ttl: 10m
        expired:
          strategy: "serve_stale"
          stale_ttl: 20m
